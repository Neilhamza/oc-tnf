apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tnf
spec:
  version: v0.0.2
  homepage: https://github.com/openshift/oc-tnf
  shortDescription: Validate STONITH fencing on TNF clusters
  description: |
    oc-tnf provides tooling for OpenShift Two Node with Fencing (TNF)
    clusters. The validate-fencing subcommand fences each cluster node
    sequentially via STONITH and verifies recovery, including Pacemaker
    rejoin and etcd quorum restoration.

    WARNING: validate-fencing is disruptive. It power-fences real nodes.
    Only run it against a TNF cluster you intend to test.
  caveats: |
    Requires SSH access to the cluster nodes (--ssh-key) and a valid
    kubeconfig for the TNF cluster. This plugin only works on OpenShift
    DualReplica (TNF) clusters.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.2/oc-tnf_linux_amd64.tar.gz
      sha256: "3bc88c28b1d4cb56d2e5e562c46c7f4da3ef517cf717f3bb6d85b845224de0c8"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.2/oc-tnf_linux_arm64.tar.gz
      sha256: "1c74ca4426b89ca672d713e67ffc959e800544b5e5871a2f8707e7b165c89376"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.2/oc-tnf_darwin_amd64.tar.gz
      sha256: "8fcdb07304a41d6dc6cbe093c39d3fef0dab500b58626f518c82dae320df90e0"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.2/oc-tnf_darwin_arm64.tar.gz
      sha256: "80fe00de64ba88d1becc9c14480326982dc8b8f423ffc88bf7909ee1d073d21f"
      bin: oc-tnf
