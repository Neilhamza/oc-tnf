apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tnf
spec:
  version: v0.0.4
  homepage: https://github.com/openshift/oc-tnf
  shortDescription: Validate STONITH fencing on TNF clusters
  description: |
    oc-tnf provides tooling for OpenShift Two Node with Fencing (TNF)
    clusters. The validate-fencing subcommand fences each cluster node
    sequentially via STONITH and verifies recovery, including Pacemaker
    rejoin and etcd quorum restoration.

    WARNING: validate-fencing is disruptive. It power-fences real nodes.
    Only run it against a TNF cluster you intend to test.
  caveats: |
    Requires SSH access to the cluster nodes (--ssh-key) and a valid
    kubeconfig for the TNF cluster. This plugin only works on OpenShift
    DualReplica (TNF) clusters.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.4/oc-tnf_linux_amd64.tar.gz
      sha256: "35092a1c388bdae5074d87ab8397238a3c153913b136d74078bdf08ba45ef237"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.4/oc-tnf_linux_arm64.tar.gz
      sha256: "d3dd2522b0d6db445f1bfb676e16c3591ecee6bb5af4b84f43ccac0e0a708dcc"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.4/oc-tnf_darwin_amd64.tar.gz
      sha256: "85a6e402302a900773fffa5fa67da64386579ff81eb4976d3d9f0e288a004d38"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.4/oc-tnf_darwin_arm64.tar.gz
      sha256: "354a1e0385410c8df4db47f69f630216b7e67dd15f69bdfe55c8c736ba372c00"
      bin: oc-tnf
