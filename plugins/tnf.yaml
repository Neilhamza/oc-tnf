apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tnf
spec:
  version: v0.0.7
  homepage: https://github.com/openshift/oc-tnf
  shortDescription: Validate STONITH fencing on TNF clusters
  description: |
    oc-tnf provides tooling for OpenShift Two Node with Fencing (TNF)
    clusters. The validate-fencing subcommand fences each cluster node
    sequentially via STONITH and verifies recovery, including Pacemaker
    rejoin and etcd quorum restoration.

    WARNING: validate-fencing is disruptive. It power-fences real nodes.
    Only run it against a TNF cluster you intend to test.
  caveats: |
    Requires SSH access to the cluster nodes (--ssh-key) and a valid
    kubeconfig for the TNF cluster. This plugin only works on OpenShift
    DualReplica (TNF) clusters.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.7/oc-tnf_linux_amd64.tar.gz
      sha256: "e937fa3938b367d8dc6b54a7458aa78b007c1e12f68fecefa3675a5548276368"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.7/oc-tnf_linux_arm64.tar.gz
      sha256: "28e1fd9722396e4c2fa8f7332b8b24580722c1d2d62809c53836dd393ab2fb50"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.7/oc-tnf_darwin_amd64.tar.gz
      sha256: "42f2a46b4f3c48d97b06f237976569cd77b6571daf761067f65fbb8d1b99e077"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.7/oc-tnf_darwin_arm64.tar.gz
      sha256: "b168744ff6ea0fffa3c57fc93cbfd4fb3d147828120f11ec7aa5d5e865107f18"
      bin: oc-tnf
