apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tnf
spec:
  version: v0.0.3
  homepage: https://github.com/openshift/oc-tnf
  shortDescription: Validate STONITH fencing on TNF clusters
  description: |
    oc-tnf provides tooling for OpenShift Two Node with Fencing (TNF)
    clusters. The validate-fencing subcommand fences each cluster node
    sequentially via STONITH and verifies recovery, including Pacemaker
    rejoin and etcd quorum restoration.

    WARNING: validate-fencing is disruptive. It power-fences real nodes.
    Only run it against a TNF cluster you intend to test.
  caveats: |
    Requires SSH access to the cluster nodes (--ssh-key) and a valid
    kubeconfig for the TNF cluster. This plugin only works on OpenShift
    DualReplica (TNF) clusters.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.3/oc-tnf_linux_amd64.tar.gz
      sha256: "937dff17725d509b906df3e3a2cfda5ec99c4f5739a7477a3a5fae26ccb1b8e5"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.3/oc-tnf_linux_arm64.tar.gz
      sha256: "6f6a5b56ab9cdd698062bd827d4a588b2f7446440cf5f8df162b618f61f5d002"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.3/oc-tnf_darwin_amd64.tar.gz
      sha256: "4e020584c9f7ed15cb5706f1707d8b9993a480ff71641d9e237a7dad7b6c00a9"
      bin: oc-tnf
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/openshift/oc-tnf/releases/download/v0.0.3/oc-tnf_darwin_arm64.tar.gz
      sha256: "b9ecf8a7e420a11fa18ae5840dc0dcf03980c9abb59d9107a747b775547baa1a"
      bin: oc-tnf
