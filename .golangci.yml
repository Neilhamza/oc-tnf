version: "2"
run:
  modules-download-mode: readonly
  timeout: 5m
linters:
  default: none
  enable:
    - depguard
    - goconst
    - gocritic
    - revive
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused
    - errorlint
    - gosec
  settings:
    revive:
      rules:
        - name: if-return
          severity: warning
          disabled: true
        - name: string-format
          severity: warning
          disabled: false
          arguments:
            - - 'fmt.Errorf[0]'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter
            - - 'fmt.Errorf[0]'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation
            - - panic
              - '/^[^\n]*$/'
              - must not contain line breaks
    goconst:
      min-occurrences: 4
    depguard:
      rules:
        main:
          deny:
            - pkg: "github.com/pkg/errors"
              desc: Should be replaced by standard lib errors package
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - goconst
        path: (.+)_test\.go
formatters:
  enable:
    - gofmt
    - goimports
